# sandbox-manager REST upstream — two slots for zero-downtime rolling deploys
upstream sandbox_manager {
    server 127.0.0.1:9000 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:9002 max_fails=2 fail_timeout=5s;
}

server {
    listen 80;
    listen [::]:80;
    server_name vm.todofor.ai sandbox.todofor.ai;

    # ACME challenges over plain HTTP
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / { return 301 https://$host$request_uri; }
}

# Shared SSL + proxy snippets — kept inline (no separate include file) so this
# config drops in as-is on the target host. Both hostnames terminate the same
# cert and proxy to the same Rust upstream; they differ only in `/` behavior:
# vm.todofor.ai is pure API, sandbox.todofor.ai serves the user UI at `/`.

# ── vm.todofor.ai ── pure REST/WS upstream, no UI ──────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vm.todofor.ai;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/vm.todofor.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vm.todofor.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Loopback-only admin routes must never be reachable from the public side.
    location ^~ /admin/ { return 404; }

    # Terminal WebSocket
    location ~ ^/sandbox/[^/]+/tty$ {
        proxy_pass http://sandbox_manager;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Explicit allow-list of API roots — mirrors sandbox.todofor.ai so a
    # future Rust route isn't accidentally exposed without review.
    location ~ ^/(sandbox|templates|stats|health|recovery-ca\.pub)(/|$) {
        proxy_pass http://sandbox_manager;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
    }

    location / { return 404; }
}

# ── sandbox.todofor.ai ── user UI at `/`, REST under the same paths ────────────
# UI is a single-file SPA at web/index.html. Order of `location` blocks below
# matters: prefix matches for known API roots come first, then the catch-all
# regex falls back to the static file.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sandbox.todofor.ai;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/vm.todofor.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vm.todofor.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /var/www/todoforai/apps/sandbox-manager/current/web;

    # `/admin/` is loopback-only. Reach the legacy admin UI over an SSH tunnel
    # (`ssh -L 8190:127.0.0.1:8190 …` then open http://127.0.0.1:8190/admin/`).
    location ^~ /admin/ { return 404; }

    # CLI installer (referenced from web/index.html as
    # `curl -fsSL https://$HOST/cli/install.sh | sh`). The installer itself
    # fetches the per-arch binary + sha256 from the GitHub release.
    location = /cli/install.sh {
        alias /var/www/todoforai/apps/sandbox-manager/current/cli/install.sh;
        default_type text/x-shellscript;
        add_header Cache-Control "no-cache" always;
    }

    # Terminal WebSocket
    location ~ ^/sandbox/[^/]+/tty$ {
        proxy_pass http://sandbox_manager;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Rust API paths — proxy through.
    location ~ ^/(sandbox|templates|stats|health|recovery-ca\.pub)(/|$) {
        proxy_pass http://sandbox_manager;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
    }

    # Everything else → user UI (SPA single page)
    location / {
        try_files /index.html =404;
    }
}
