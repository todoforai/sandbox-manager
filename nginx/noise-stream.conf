# sandbox-manager Noise TCP stream — L4 load balancing
# Public port: 4110. Internal ports: 9010 (paired with REST 9000), 9012 (paired with REST 9002).
# One slot is "down" at any time except during a deploy window.
#
# Include from top-level nginx.conf via:
#   stream { include /etc/nginx/streams-enabled/*.conf; }

upstream sandbox_noise {
    server 127.0.0.1:9010 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:9012 max_fails=2 fail_timeout=5s;
}

server {
    listen 4110;
    proxy_pass sandbox_noise;
    proxy_connect_timeout 5s;
    proxy_timeout 300s;
}
