<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sandboxes · TODO for AI</title>
<link rel="icon" type="image/svg+xml" href="./shared/favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./shared/theme.css">
<style>
  /* Mirrors frontend/src/app/globals.css (dark theme tokens). Values use sRGB
     hex equivalents of the source oklch() / hsl() tokens so they render
     consistently in any browser without a colorspace polyfill. */
  :root {
    color-scheme: dark;
    --font-sans: 'Geist', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Monaco, Consolas, monospace;

    --background: #1c1c1c;             /* oklch(0.145 0 0) */
    --foreground: #fafafa;             /* oklch(0.985 0 0) */
    --card: #2d2d2d;                   /* oklch(0.205 0 0) */
    --card-foreground: #fafafa;
    --popover: #2d2d2d;
    --secondary: #3d3d3d;              /* oklch(0.269 0 0) */
    --muted: #3d3d3d;
    --muted-foreground: #a3a3a3;       /* oklch(0.7 0 0) */
    --accent-bg: #3d3d3d;
    --border: rgba(255, 255, 255, 0.10);
    --input: rgba(255, 255, 255, 0.15);
    --ring: rgba(255, 255, 255, 0.32);

    --primary: #f96e2e;                /* brand orange */
    --primary-hover: #ff8c40;
    --primary-foreground: #fafafa;
    --success: #22c55e;
    --warning: #c08114;
    --destructive: #ef4444;

    --radius-xs: 4px;
    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 14px;

    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
    --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.4);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    background: var(--background);
    color: var(--foreground);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--primary); color: var(--primary-foreground); }
  code { font-family: var(--font-mono); }

  /* ---------- Top bar ---------- */
  header {
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--background) 80%, transparent);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 50;
  }
  .bar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 24px;
    align-items: center;
    padding: 14px 28px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .brand {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--foreground);
    display: inline-flex; align-items: center; gap: 8px;
    text-decoration: none;
  }
  .brand:hover { color: var(--foreground); }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 20%, transparent);
  }
  .brand b { color: var(--primary); font-weight: 700; }
  .crumbs {
    color: var(--muted-foreground);
    font-size: 13px;
  }
  .crumbs .sep { color: var(--border); margin: 0 8px; }
  .user-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--muted-foreground);
    background: var(--card);
  }
  .user-chip .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
  }

  /* ---------- Page ---------- */
  main { max-width: 1280px; margin: 0 auto; padding: 32px 28px; }

  .page-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 24px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .page-head h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.025em;
    margin: 0 0 6px;
  }
  .page-head .sub {
    color: var(--muted-foreground);
    font-size: 14px;
    margin: 0;
  }

  /* ---------- Stats strip ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .stat {
    padding: 18px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--card);
  }
  .stat .l {
    font-size: 12px;
    color: var(--muted-foreground);
    margin-bottom: 6px;
  }
  .stat .v {
    font-size: 26px;
    line-height: 1.1;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .stat .v small { font-size: 13px; color: var(--muted-foreground); font-weight: 500; margin-left: 4px; }

  /* ---------- Buttons ---------- */
  button, .btn {
    font: 500 14px/1 var(--font-sans);
    background: transparent;
    color: var(--foreground);
    border: 1px solid var(--border);
    padding: 8px 14px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease, box-shadow 120ms ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    white-space: nowrap;
    text-decoration: none;
  }
  button:hover:not(:disabled), .btn:hover { background: var(--accent-bg); }
  button:focus-visible, .btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 40%, transparent);
    border-color: var(--ring);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary, .btn.primary {
    background: var(--primary);
    color: var(--primary-foreground);
    border-color: var(--primary);
    font-weight: 600;
  }
  button.primary:hover:not(:disabled), .btn.primary:hover {
    background: var(--primary-hover);
    border-color: var(--primary-hover);
  }
  button.danger { color: var(--destructive); border-color: color-mix(in srgb, var(--destructive) 35%, transparent); }
  button.danger:hover:not(:disabled) {
    background: var(--destructive);
    color: white;
    border-color: var(--destructive);
  }
  button.ghost { border-color: transparent; color: var(--muted-foreground); }
  button.ghost:hover:not(:disabled) { color: var(--foreground); background: var(--accent-bg); }

  /* ---------- VM list ---------- */
  .vm-list { display: flex; flex-direction: column; gap: 10px; }
  .vm {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--card);
    display: grid;
    grid-template-columns: 4px 1fr auto;
    gap: 0;
    overflow: hidden;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .vm:hover { border-color: color-mix(in srgb, var(--foreground) 18%, transparent); box-shadow: var(--shadow-sm); }
  .vm-stripe { background: var(--muted-foreground); }
  .vm[data-state="running"] .vm-stripe { background: var(--success); }
  .vm[data-state="paused"]  .vm-stripe { background: var(--warning); }
  .vm[data-state="creating"] .vm-stripe { background: var(--primary); animation: pulse 1.2s ease-in-out infinite; }
  .vm[data-state="error"] .vm-stripe,
  .vm[data-state="terminating"] .vm-stripe,
  .vm[data-state="terminated"] .vm-stripe { background: var(--destructive); }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }

  .vm-body { padding: 16px 20px; min-width: 0; }
  .vm-row1 {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .vm-template {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.005em;
  }
  .vm-id {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted-foreground);
  }
  .vm-id code { color: var(--foreground); }
  .vm-state {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid currentColor;
    color: var(--muted-foreground);
    background: color-mix(in srgb, currentColor 8%, transparent);
    text-transform: capitalize;
  }
  .vm[data-state="running"] .vm-state { color: var(--success); }
  .vm[data-state="paused"]  .vm-state { color: var(--warning); }
  .vm[data-state="creating"] .vm-state { color: var(--primary); }
  .vm[data-state="error"] .vm-state,
  .vm[data-state="terminating"] .vm-state,
  .vm[data-state="terminated"] .vm-state { color: var(--destructive); }
  .vm-row2 {
    display: flex; gap: 18px; flex-wrap: wrap;
    color: var(--muted-foreground);
    font-size: 13px;
  }
  .vm-row2 .kv { display: inline-flex; gap: 6px; align-items: baseline; }
  .vm-row2 .kv .k { color: var(--muted-foreground); }
  .vm-row2 .kv b { color: var(--foreground); font-weight: 500; }
  .vm-err {
    margin-top: 10px;
    color: var(--destructive);
    font-size: 13px;
    word-break: break-word;
  }
  .vm-actions {
    display: flex; align-items: center; gap: 6px;
    padding: 12px 16px;
    border-left: 1px solid var(--border);
  }
  .vm-actions button { padding: 7px 12px; font-size: 13px; }

  /* ---------- Empty / loading / error states ---------- */
  .placeholder {
    border: 1px dashed var(--border);
    border-radius: var(--radius-md);
    padding: 64px 28px;
    text-align: center;
    color: var(--muted-foreground);
    background: var(--card);
  }
  .placeholder h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--foreground);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .placeholder p { margin: 0 0 20px; font-size: 14px; }
  .placeholder .actions { display: inline-flex; gap: 12px; }

  /* ---------- Modal ---------- */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    display: grid; place-items: center;
    z-index: 100;
    animation: fadein 140ms ease-out;
    padding: 20px;
  }
  @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: min(540px, 100%);
    box-shadow: var(--shadow-lg);
    animation: slideup 200ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideup { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
  .modal-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h3 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .modal-head .close {
    background: transparent; border: 0; color: var(--muted-foreground);
    cursor: pointer; padding: 6px; font-size: 20px; line-height: 1;
    border-radius: var(--radius-sm);
    width: 32px; height: 32px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .modal-head .close:hover { background: var(--accent-bg); color: var(--foreground); }
  .modal-body { padding: 22px 24px; }
  .modal-body label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted-foreground);
    margin-bottom: 10px;
  }
  .tpl-grid {
    display: grid; grid-template-columns: 1fr; gap: 8px;
    margin-bottom: 18px;
  }
  .tpl {
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    background: var(--background);
    transition: border-color 120ms ease, background 120ms ease;
  }
  .tpl:hover { border-color: color-mix(in srgb, var(--foreground) 25%, transparent); }
  .tpl.sel {
    border-color: var(--primary);
    background: color-mix(in srgb, var(--primary) 8%, var(--card));
  }
  .tpl .name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .tpl .meta { font-size: 12px; color: var(--muted-foreground); }
  .tpl .check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .tpl.sel .check { border-color: var(--primary); background: var(--primary); }
  .tpl.sel .check::after {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--primary-foreground);
  }
  .modal-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .err-msg {
    color: var(--destructive);
    font-size: 13px;
    padding: 12px 16px;
    border: 1px solid color-mix(in srgb, var(--destructive) 40%, transparent);
    background: color-mix(in srgb, var(--destructive) 10%, transparent);
    border-radius: var(--radius-sm);
    margin-bottom: 20px;
  }

  /* ---------- Sign-in screen ---------- */
  .signin {
    min-height: calc(100vh - 56px);
    display: grid; place-items: center;
    padding: 40px 20px;
  }
  .signin-card {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 48px 40px;
    max-width: 440px;
    text-align: center;
    box-shadow: var(--shadow-md);
  }
  .signin-card .icon {
    width: 56px; height: 56px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--primary) 12%, transparent);
    color: var(--primary);
    display: grid; place-items: center;
    font-size: 28px;
  }
  .signin-card h2 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin: 0 0 8px;
  }
  .signin-card p {
    color: var(--muted-foreground);
    margin: 0 0 24px;
    font-size: 14px;
    line-height: 1.55;
  }
  .signin-card .primary { width: 100%; padding: 11px 22px; font-size: 14px; }

  /* ---------- Footer hint ---------- */
  footer {
    margin-top: 60px;
    padding: 24px 28px;
    border-top: 1px solid var(--border);
    color: var(--muted-foreground);
    font-size: 12px;
    text-align: center;
  }
  footer a { color: var(--muted-foreground); text-decoration: underline; text-underline-offset: 2px; }
  footer a:hover { color: var(--foreground); }

  /* ---------- Spinner ---------- */
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid color-mix(in srgb, currentColor 20%, transparent);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* ---------- Inputs ---------- */
  input[type="text"], input[type="password"] {
    font: inherit;
    background: var(--background);
    color: var(--foreground);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    outline: none;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--ring);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 30%, transparent);
  }

  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }

  /* ---------- Agent-native section ---------- */
  /* .agent-native / .tabs / .tab-panel / .code-block live in shared/theme.css */

  @media (max-width: 640px) {
    .bar { padding: 12px 16px; gap: 12px; }
    .crumbs { display: none; }
    main { padding: 20px 16px; }
    .page-head h1 { font-size: 26px; }
    .vm { grid-template-columns: 4px 1fr; }
    .vm-actions {
      grid-column: 1 / -1;
      border-left: 0;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      padding: 10px 16px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="bar">
    <a class="brand" href="/" aria-label="TODO for AI — Sandboxes">
      <span class="dot"></span>
      TODO for AI <b>/ Sandboxes</b>
    </a>
    <div class="crumbs">Firecracker microVMs</div>
    <div id="user-chip"></div>
  </div>
</header>

<main id="app">
  <div class="placeholder">
    <span class="spinner"></span>
    <p style="margin-top:14px">Loading…</p>
  </div>
</main>

<footer>
  Powered by Firecracker · <a href="https://todofor.ai" target="_blank" rel="noopener noreferrer">todofor.ai</a>
</footer>

<script type="module">
import { makeAuth, el, $, fmtAge, renderSignIn, renderUserChip, code, renderAgentGuide } from './shared/auth.js';

const { api: baseApi, signOut } = makeAuth('sandbox');
async function api(path, opts) {
  try { return await baseApi(path, opts); }
  catch (e) {
    if (e.unauth) { state.authed = false; render(); }
    throw e;
  }
}

// ────────────────────────────────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────────────────────────────────
const state = {
  authed: null,           // null = unknown, false = signed out, true = signed in
  sandboxes: [],
  templates: [],
  err: null,
  pendingAction: null,    // sandbox id with action in-flight
  showCreate: false,
  selectedTpl: null,
  agentTab: 'cli',        // 'cli' | 'curl' | 'prompt'
};

// ────────────────────────────────────────────────────────────────────────────
// Data
// ────────────────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [list, templates] = await Promise.all([
      api('/sandbox'),
      api('/templates').catch(() => []),
    ]);
    state.authed = true;
    const aliveRank = { running: 0, paused: 1, creating: 2 };
    state.sandboxes = (list || [])
      .filter(s => s.state !== 'terminated')
      .sort((a, b) => (aliveRank[a.state] ?? 9) - (aliveRank[b.state] ?? 9) || (b.last_activity || 0) - (a.last_activity || 0));
    state.templates = templates || [];
    state.err = null;
  } catch (e) {
    if (e.message === 'unauthenticated') {
      // render() already invoked via the 401 path
      return;
    }
    // Any other failure (network, 5xx, etc.) — surface the error but still
    // show the panel so the user can retry / sign in manually.
    state.authed = true;
    state.err = e.message;
  }
  render();
}

async function act(id, action) {
  state.pendingAction = `${id}:${action}`;
  render();
  try {
    if (action === 'pause')          await api(`/sandbox/${id}/pause`,          { method: 'POST' });
    if (action === 'resume')         await api(`/sandbox/${id}/resume`,         { method: 'POST' });
    if (action === 'restart-bridge') await api(`/sandbox/${id}/restart-bridge`, { method: 'POST' });
    if (action === 'delete')         await api(`/sandbox/${id}`,                 { method: 'DELETE' });
    await loadAll();
  } catch (e) {
    state.err = e.message;
  } finally {
    state.pendingAction = null;
    render();
  }
}

async function createSandbox(template) {
  state.pendingAction = `create:${template}`;
  render();
  try {
    await api('/sandbox', { method: 'POST', body: JSON.stringify({ template }) });
    state.showCreate = false;
    state.selectedTpl = null;
    await loadAll();
  } catch (e) {
    state.err = e.message;
  } finally {
    state.pendingAction = null;
    render();
  }
}

// ────────────────────────────────────────────────────────────────────────────
// Render
// ────────────────────────────────────────────────────────────────────────────
function render() {
  const root = $('#app');
  root.innerHTML = '';
  $('#user-chip').innerHTML = '';

  if (state.authed === false) {
    root.appendChild(renderSignIn());
    return;
  }
  if (state.authed === null) {
    root.appendChild(el('div', { class: 'placeholder' },
      el('span', { class: 'spinner' }),
      el('p', { style: 'margin-top:14px' }, 'Connecting…'),
    ));
    return;
  }

  // User chip
  const sboxCount = state.sandboxes.length;
  $('#user-chip').appendChild(renderUserChip({
    label: `${sboxCount} sandbox${sboxCount === 1 ? '' : 'es'}`,
    signOut,
  }));

  // Page head
  root.appendChild(
    el('div', { class: 'page-head' },
      el('div', {},
        el('h1', {}, 'Sandboxes'),
        el('p', { class: 'sub' }, 'Spin up isolated Firecracker microVMs for your AI agents to work in.'),
      ),
      el('div', { style: 'display:flex;gap:8px;flex-wrap:wrap' },
        el('button', { class: 'ghost', onclick: loadAll, title: 'Refresh' }, '↻ Refresh'),
        el('button', { class: 'primary', onclick: () => { state.showCreate = true; render(); } },
          'New sandbox',
        ),
      ),
    ),
  );

  // Stats
  const running = state.sandboxes.filter(s => s.state === 'running').length;
  const paused = state.sandboxes.filter(s => s.state === 'paused').length;
  const cost = state.sandboxes
    .filter(s => s.state === 'running')
    .reduce((a, s) => a + (s.cost_per_minute || 0), 0);
  root.appendChild(
    el('div', { class: 'stats' },
      stat('Total',   sboxCount),
      stat('Running', running),
      stat('Paused',  paused),
      stat('Cost',    `$${(cost * 60).toFixed(3)}`, '/ hour'),
    ),
  );

  if (state.err) {
    root.appendChild(el('div', { class: 'err-msg' }, '⚠ ', state.err));
  }

  // List or empty
  if (sboxCount === 0) {
    root.appendChild(
      el('div', { class: 'placeholder' },
        el('h2', {}, 'no sandboxes yet'),
        el('p', {}, 'spin one up to start running code in an isolated firecracker vm.'),
        el('div', { class: 'actions' },
          el('button', { class: 'primary', onclick: () => { state.showCreate = true; render(); } },
            'Create your first sandbox',
          ),
        ),
      ),
    );
  } else {
    const list = el('div', { class: 'vm-list' });
    for (const s of state.sandboxes) list.appendChild(renderVm(s));
    root.appendChild(list);
  }

  // Agent-native section — guide for using the API/CLI directly. Only shown
  // when authenticated; the goal is to make it obvious this panel is just a
  // thin wrapper over a REST API + CLI that an AI agent can drive itself.
  root.appendChild(renderAgentNative());

  if (state.showCreate) root.appendChild(renderCreateModal());
}

function stat(label, value, unit) {
  return el('div', { class: 'stat' },
    el('div', { class: 'l' }, label),
    el('div', { class: 'v' }, String(value), unit ? el('small', {}, ' ' + unit) : null),
  );
}

function renderVm(s) {
  const busy = id => state.pendingAction && state.pendingAction.startsWith(s.id + ':') && state.pendingAction.endsWith(id);
  const anyBusy = !!(state.pendingAction && state.pendingAction.startsWith(s.id + ':'));

  const actions = el('div', { class: 'vm-actions' });
  if (s.state === 'running') {
    actions.appendChild(btn('Pause', () => act(s.id, 'pause'), { disabled: anyBusy, busy: busy('pause') }));
  }
  if (s.state === 'paused') {
    actions.appendChild(btn('Resume', () => act(s.id, 'resume'), { disabled: anyBusy, busy: busy('resume') }));
  }
  if (s.kind === 'vm' && s.state === 'running') {
    actions.appendChild(btn('Connect to TODOforAI', () => {
      if (confirm(`Reconnect sandbox ${s.id.slice(0, 8)}… to TODOforAI?\n\nThe VM will reboot and re-enroll with a fresh token.`)) act(s.id, 'restart-bridge');
    }, { disabled: anyBusy, busy: busy('restart-bridge') }));
  }
  actions.appendChild(
    btn('Terminate', () => {
      if (confirm(`Terminate sandbox ${s.id.slice(0, 8)}…?\n\nThis cannot be undone.`)) act(s.id, 'delete');
    }, { disabled: anyBusy, busy: busy('delete'), cls: 'danger' }),
  );

  return el('div', { class: 'vm', 'data-state': s.state },
    el('div', { class: 'vm-stripe' }),
    el('div', { class: 'vm-body' },
      el('div', { class: 'vm-row1' },
        el('div', { class: 'vm-template' }, s.template),
        el('div', { class: 'vm-state' }, s.state),
        el('div', { class: 'vm-id' }, 'id ', el('code', {}, s.id.slice(0, 12)), '…'),
      ),
      el('div', { class: 'vm-row2' },
        kv('kind', s.kind),
        kv('size', s.size),
        kv('ip',   s.ip_address || '—'),
        kv('age',  fmtAge(s.created_at)),
        kv('idle', fmtAge(s.last_activity)),
        s.cost_per_minute ? kv('rate', '$' + (s.cost_per_minute * 60).toFixed(3) + '/h') : null,
      ),
      s.error ? el('div', { class: 'vm-err' }, '⚠ ', s.error) : null,
    ),
    actions,
  );
}

function kv(k, v) {
  return el('span', { class: 'kv' },
    el('span', { class: 'k' }, k + ':'),
    el('b', {}, String(v)),
  );
}

function btn(label, onclick, { disabled, busy, cls } = {}) {
  return el('button', { class: cls || '', disabled: disabled || busy, onclick },
    busy ? el('span', { class: 'spinner' }) : null,
    label,
  );
}

function renderCreateModal() {
  const tpls = state.templates;
  const sel = state.selectedTpl || tpls[0];
  const busy = state.pendingAction && state.pendingAction.startsWith('create:');

  const tplGrid = el('div', { class: 'tpl-grid' });
  for (const t of tpls) {
    tplGrid.appendChild(
      el('div', {
        class: 'tpl' + (t === sel ? ' sel' : ''),
        onclick: () => { state.selectedTpl = t; render(); },
      },
        el('div', {},
          el('div', { class: 'name' }, t),
          el('div', { class: 'meta' }, t.includes('lite') ? 'bwrap · cli-only · free tier' : 'firecracker microvm'),
        ),
        el('div', { class: 'meta' }, t === sel ? '◉ selected' : '○'),
      ),
    );
  }
  if (!tpls.length) {
    tplGrid.appendChild(el('div', { class: 'tpl' }, 'No templates available'));
  }

  const bg = el('div', { class: 'modal-bg', onclick: e => { if (e.target === bg) { state.showCreate = false; render(); } } },
    el('div', { class: 'modal' },
      el('div', { class: 'modal-head' },
        el('h3', {}, 'new sandbox'),
        el('button', { class: 'close', onclick: () => { state.showCreate = false; render(); } }, '×'),
      ),
      el('div', { class: 'modal-body' },
        el('label', {}, 'select template'),
        tplGrid,
        el('p', { style: 'color:var(--muted-foreground);font-size:13px;margin:0;line-height:1.5' },
          'Sandbox is allocated immediately. Lite (bwrap) sandboxes are stateless and free; full VMs accrue a per-minute charge while running.',
        ),
      ),
      el('div', { class: 'modal-foot' },
        el('button', { onclick: () => { state.showCreate = false; render(); } }, 'Cancel'),
        el('button', {
          class: 'primary',
          disabled: !sel || busy,
          onclick: () => createSandbox(sel),
        },
          busy ? el('span', { class: 'spinner' }) : null,
          busy ? 'Provisioning…' : 'Launch',
        ),
      ),
    ),
  );
  return bg;
}

// ────────────────────────────────────────────────────────────────────────────
// Agent-native guide
// ────────────────────────────────────────────────────────────────────────────

const HOST = location.host;
const ORIGIN = location.origin;
// Sample sandbox id from the user's actual list when available, else a fixture.
function sampleId() {
  const s = state.sandboxes.find(s => s.state === 'running' || s.state === 'paused')
        || state.sandboxes[0];
  return s ? s.id : 'sbx-<id>';
}

function renderAgentNative() {
  const id = sampleId();
  return renderAgentGuide({
    subtitle: 'This panel is a thin client over a small REST API. Your AI agent can drive sandboxes directly — install the CLI, hit the endpoints, or give an LLM the system prompt below.',
    state, rerender: render,
    tabs: [
      { key: 'cli', label: 'sandbox CLI', render: () => [
        el('p', {}, 'The ', el('code', {}, 'sandbox'),
          ' CLI is a single static binary (~200 KB) that talks to this service over Noise_NX. ',
          'Drop it next to your agent and use the same identity you used for this panel.'),
        el('h3', {}, 'Install'),
        code('bash', `# Linux / macOS (single static binary, no deps)
curl -fsSL https://${HOST}/cli/install.sh | sh

# Or pick a specific build from
# https://github.com/todoforai/sandbox-manager/releases/latest`),
        el('h3', {}, 'Authenticate'),
        code('bash', `# Opens a one-time login flow and stores an API key locally.
sandbox login
sandbox whoami`),
        el('h3', {}, 'Drive sandboxes'),
        code('bash', `sandbox list
sandbox create --template cli-lite
sandbox pause   ${id}
sandbox resume  ${id}
sandbox delete  ${id}`),
        el('p', {}, 'The CLI talks Noise_NX over TCP. Set ',
          el('code', {}, 'NOISE_ADDR'), ' (e.g. ',
          el('code', {}, 'sandbox.todofor.ai:4110'), ') and ',
          el('code', {}, 'NOISE_REMOTE_PUBKEY'),
          ' to point at a specific instance — see the release notes for the current production values.'),
      ]},
      { key: 'curl', label: 'REST · curl', render: () => [
        el('p', {}, 'Every action this panel takes is a plain REST call. Authenticate with ',
          el('code', {}, 'Authorization: Bearer <api-key>'), ' — generate one at ',
          el('a', { href: 'https://todofor.ai/account/api-keys', target: '_blank', rel: 'noopener noreferrer', style: 'color:var(--primary)' }, 'todofor.ai/account/api-keys'),
          '.'),
        el('h3', {}, 'List your sandboxes'),
        code('bash', `curl -s ${ORIGIN}/sandbox \\
  -H "Authorization: Bearer $TODOFORAI_API_KEY" | jq`),
        el('h3', {}, 'Create one'),
        code('bash', `curl -s -X POST ${ORIGIN}/sandbox \\
  -H "Authorization: Bearer $TODOFORAI_API_KEY" \\
  -H "Content-Type: application/json" \\
  -d '{"template":"cli-lite"}' | jq`),
        el('h3', {}, 'Pause / resume / delete'),
        code('bash', `curl -X POST   ${ORIGIN}/sandbox/${id}/pause  -H "Authorization: Bearer $TODOFORAI_API_KEY"
curl -X POST   ${ORIGIN}/sandbox/${id}/resume -H "Authorization: Bearer $TODOFORAI_API_KEY"
curl -X DELETE ${ORIGIN}/sandbox/${id}        -H "Authorization: Bearer $TODOFORAI_API_KEY"`),
        el('h3', {}, 'Run a command inside a lite sandbox'),
        code('bash', `curl -s -X POST ${ORIGIN}/sandbox/${id}/exec \\
  -H "Authorization: Bearer $TODOFORAI_API_KEY" \\
  -H "Content-Type: application/json" \\
  -d '{"argv":["python3","-c","print(1+1)"]}' | jq`),
      ]},
      { key: 'prompt', label: 'LLM prompt', render: () => [
        el('p', {}, 'Hand this paragraph to any tool-using LLM (Claude, GPT, Gemini) and it can manage your sandboxes for you. ',
          'The API surface is small enough to fit in a single prompt — no MCP server required.'),
        el('h3', {}, 'Drop-in system prompt'),
        code('text', `You have access to a sandbox manager at ${ORIGIN}.
Authenticate every request with the header
  Authorization: Bearer <TODOFORAI_API_KEY>

Endpoints (all JSON):
  GET    /sandbox            list the user's sandboxes
  POST   /sandbox            create one. body: {"template":"cli-lite"} or {"template":"ubuntu-base","size":"medium"}
  GET    /sandbox/<id>       fetch one
  POST   /sandbox/<id>/pause
  POST   /sandbox/<id>/resume
  DELETE /sandbox/<id>       terminate
  POST   /sandbox/<id>/exec  body: {"argv":["bin","arg1","arg2"]}  (lite sandboxes only)
  GET    /templates          list available templates

Conventions:
  - cli-lite is free and stateless; ubuntu-base is a full microVM.
  - Reuse an existing running sandbox before creating a new one.
  - On error, the response body is plain text — surface it verbatim to the user.`),
        el('p', { style: 'margin-top:10px' }, 'Pair with a ', el('code', {}, 'bash'),
          ' tool and the LLM can run those curls itself.'),
      ]},
    ],
  });
}

// ────────────────────────────────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────────────────────────────────
loadAll();
// Poll every 8s while the tab is visible, only if authed.
setInterval(() => {
  if (state.authed && !document.hidden) loadAll();
}, 8000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.authed) loadAll();
});
</script>
</body>
</html>
